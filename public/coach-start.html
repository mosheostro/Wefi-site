<style>
/* ── Light mode tokens (default) ─────────────────────────────── */
:root {
  --cream: #F8F4EF;
  --cream-deep: #EDE8E1;
  --sand: #D4C5B0;
  --gold: #B8956A;
  --gold-light: #D4B896;
  --gold-dark: #9A7B55;
  --charcoal: #2A2622;
  --text: #2E2A26;
  --text-muted: #5A4F47;
  --text-light: #7A6F66;
  --white: #FDFCFA;
  --nav-bg-scroll: rgba(248,244,239,0.94);
  --card-bg: #FDFCFA;
  --card-border: #D4C5B0;
  --section-alt: #EDE8E1;
  --font-display: 'DM Serif Display', Georgia, serif;
  --font-body: 'DM Sans', system-ui, sans-serif;
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  --theme-transition: background 0.35s var(--ease-out), color 0.35s var(--ease-out), border-color 0.35s var(--ease-out);
}

/* ── Dark mode tokens ────────────────────────────────────────── */
[data-theme="dark"] {
  --cream: #1C1A17;
  --cream-deep: #171512;
  --sand: #564C42;
  --charcoal: #F0EDE8;
  --text: #F0EBE3;
  --text-muted: #C4BCB2;
  --text-light: #9C9388;
  --white: #252220;
  --gold-light: #C8A87A;
  --gold-dark: #C4A07A;
  --nav-bg-scroll: rgba(28,26,23,0.94);
  --card-bg: #2E2A26;
  --card-border: #46403A;
  --section-alt: #171512;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body { font-family: var(--font-body); color: var(--text); background: var(--cream); line-height: 1.6; overflow-x: hidden; transition: var(--theme-transition); }

.reveal { opacity: 0; transform: translateY(32px); transition: opacity 0.8s var(--ease-out), transform 0.8s var(--ease-out); }
.reveal.visible { opacity: 1; transform: translateY(0); }
.reveal-delay-1 { transition-delay: 0.1s; }
.reveal-delay-2 { transition-delay: 0.2s; }
.reveal-delay-3 { transition-delay: 0.3s; }
.reveal-delay-4 { transition-delay: 0.4s; }

/* ── Modals ──────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(28, 24, 18, 0.65); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.4s var(--ease-out);
}
.modal-overlay.active { opacity: 1; pointer-events: auto; }
.modal-overlay .modal-content {
  background: var(--white); border-radius: 20px;
  max-width: 640px; width: 92%; max-height: 88vh; overflow-y: auto;
  padding: 48px; position: relative;
  transform: translateY(24px) scale(0.97); transition: transform 0.5s var(--ease-out);
}
.modal-overlay.active .modal-content { transform: translateY(0) scale(1); }

/* ── Scrollbar ───────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--sand); border-radius: 3px; }

.micro-anim { width: 100%; border-radius: 18px; overflow: hidden; position: relative; background: var(--charcoal); aspect-ratio: 16/10; min-height: 320px; box-shadow: 0 12px 40px rgba(0,0,0,0.18); }
[data-theme="dark"] .micro-anim { box-shadow: 0 12px 40px rgba(0,0,0,0.45); }
@media (max-width: 600px) { .micro-anim { min-height: 240px; aspect-ratio: 4/3; } }

/* ── Mobile Nav ──────────────────────────────────────────────── */
.nav-mobile-menu {
  position: fixed; inset: 0; top: 64px; z-index: 99;
  background: var(--cream); display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 24px;
  transform: translateY(-100%); opacity: 0;
  transition: transform 0.4s var(--ease-out), opacity 0.4s var(--ease-out);
  pointer-events: none;
}
.nav-mobile-menu.open { transform: translateY(0); opacity: 1; pointer-events: auto; }

.nav-controls { display: flex; align-items: center; gap: 8px; }

/* ── Hamburger ───────────────────────────────────────────────── */
.hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 8px; background: none; border: none; }
.hamburger span { display: block; width: 22px; height: 2px; background: var(--charcoal); border-radius: 2px; transition: all 0.3s var(--ease-out); }
.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

/* ── Theme & Lang toggles ────────────────────────────────────── */
.ctrl-btn {
  width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--sand);
  background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: var(--text); transition: all 0.2s;
}
.ctrl-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(184,149,106,0.08); }
[data-theme="dark"] .ctrl-btn { border-color: #6B6058; color: var(--text); }
[data-theme="dark"] .ctrl-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(200,168,122,0.12); }

.lang-menu-wrap { position: relative; }
.lang-menu {
  position: absolute; top: calc(100% + 8px); right: 0;
  background: var(--white); border: 1px solid var(--card-border);
  border-radius: 12px; padding: 6px; min-width: 120px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  display: none; z-index: 200;
}
.lang-menu.open { display: block; }
.lang-opt {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-radius: 8px; border: none; background: transparent;
  width: 100%; cursor: pointer; font-size: 13px; font-weight: 500;
  color: var(--text); font-family: var(--font-body); text-align: left;
  transition: background 0.15s;
}
.lang-opt:hover { background: var(--cream-deep); }
.lang-opt.active { color: var(--gold); }

/* ── RTL support ─────────────────────────────────────────────── */
[dir="rtl"] { text-align: right; }
[dir="rtl"] .nav-controls { flex-direction: row-reverse; }
[dir="rtl"] .lang-menu { right: auto; left: 0; }

/* ── Responsive breakpoints ──────────────────────────────────── */
@media (max-width: 900px) {
  .hamburger { display: flex; }
  .nav-cta-desktop { display: none; }
  .section-2col { grid-template-columns: 1fr !important; }
  .section-4col { grid-template-columns: 1fr 1fr !important; }
  .section-3col { grid-template-columns: 1fr !important; }
  .hero-grid { grid-template-columns: 1fr !important; }
  .tools-grid { grid-template-columns: 1fr 1fr !important; }
  .modal-overlay .modal-content { padding: 28px 20px; }
  .modal-2col { grid-template-columns: 1fr !important; }
}

@media (max-width: 600px) {
  .section-4col { grid-template-columns: 1fr !important; }
  .tools-grid { grid-template-columns: 1fr !important; }
  .section-pad { padding-left: 18px !important; padding-right: 18px !important; }
  .hero-h1 { font-size: clamp(32px, 9vw, 52px) !important; }
  .modal-overlay .modal-content { padding: 20px 16px; border-radius: 14px; }
  .cta-btns { flex-direction: column; align-items: stretch; }
  .cta-btns button { width: 100%; justify-content: center; }
  .transform-compare { grid-template-columns: 1fr !important; gap: 8px !important; }
}

/* ── Tools section: charcoal in light, deep-dark in dark ───── */
.section-tools-bg { background: #2A2622; }
[data-theme="dark"] .section-tools-bg { background: #171512; }

/* ── Week 3 card: always dark for emphasis ──────────────────── */
.week-card-dark { background: #2A2622; color: var(--cream); }
[data-theme="dark"] .week-card-dark { background: #252220; }

/* ── Card surfaces ───────────────────────────────────────────── */
.card-surface {
  background: var(--card-bg);
  border-color: var(--card-border);
  transition: var(--theme-transition), transform 0.3s var(--ease-out), box-shadow 0.3s var(--ease-out);

.card-surface:hover {
  background: var(--white);
  border-color: var(--gold-light);
  transform: translateY(-2px);
  box-shadow: 0 10px 32px rgba(0,0,0,0.10);
}

/* ── Before/after compare cards ─────────────────────────────── */
.before-card {
  background: var(--cream-deep);
  border: 1px solid var(--sand);
}
.after-card {
  background: rgba(184,149,106,0.08);
  border: 1px solid rgba(184,149,106,0.25);
}
[data-theme="dark"] .after-card {
  background: rgba(184,149,106,0.16);
  border-color: rgba(184,149,106,0.45);
}
[data-theme="dark"] .before-card {
  background: #252220;
  border-color: #46403A;
  color: var(--text-muted);
}

/* ── Dark mode: stronger card hover & borders ──────────────── */
[data-theme="dark"] .card-surface {
  background: var(--card-bg);
  border-color: var(--card-border);
}
[data-theme="dark"] .card-surface:hover {
  background: #36322D;
  border-color: var(--gold);
  box-shadow: 0 12px 36px rgba(0,0,0,0.35);
}

/* ── Body min size for readability ───────────────────────── */
body { font-size: 16px; }
@media (max-width: 600px) { body { font-size: 15px; } }

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {hasDeckStage && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});
</script>

<script type="text/babel">
/* Micro-animation components — scroll-triggered with continuous idle states */

const useInView = (ref, threshold = 0.3) => {
  const [inView, setInView] = React.useState(false);
  React.useEffect(() => {
    if (!ref.current) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setInView(true); }, { threshold });
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, [ref, threshold]);
  return inView;
};

/* Continuous timer — t grows unbounded; use Math.min(t,1) for reveal, raw t for idle loops */
const useAnimTimer = (inView, duration = 9000) => {
  const [t, setT] = React.useState(0);
  const startRef = React.useRef(null);
  React.useEffect(() => {
    if (!inView) return;
    startRef.current = performance.now();
    let raf;
    const tick = (now) => {
      setT((now - startRef.current) / duration);
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [inView, duration]);
  return t;
};

const ease = (t) => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
const lerp = (a, b, t) => a + (b - a) * Math.min(Math.max(t, 0), 1);
const easeRev = (t) => ease(Math.min(t, 1));
const breathe = (t, speed = 1, amp = 1) => Math.sin(t * speed * Math.PI * 2) * amp;

/* Animation 1: Hero Brand — text assembles then floats gently */
const HeroBrandAnim = () => {
  const ref = React.useRef(null);
  const inView = useInView(ref, 0.2);
  const t = useAnimTimer(inView, 10000);
  const cs = window.__CS;

  const words = [cs.tr('identity'), cs.tr('animPresence'), cs.tr('animClients'), cs.tr('message')];
  const colors = ["#B8956A", "#D4B896", "#9A7B55", "#C4A07A"];
  const revealed = Math.min(t, 1);

  return (
    <div ref={ref} style={{
      width: "100%", aspectRatio: "16/9", borderRadius: 16, overflow: "hidden",
      background: "linear-gradient(150deg, #1E1C19 0%, #2A2622 50%, #332F2A 100%)",
      display: "flex", alignItems: "center", justifyContent: "center",
      position: "relative", fontFamily: "var(--font-display)"
    }}>
      {/* Ambient rings — pulse after reveal */}
      <div style={{ position: "absolute", inset: 0 }}>
        {[...Array(5)].map((_, i) => {
          const scale = easeRev(Math.max(0, revealed * 3 - i * 0.15));
          const idlePulse = t > 0.5 ? 1 + breathe(t - 0.5, 0.18 + i * 0.04, 0.03) : 1;
          return (
            <div key={i} style={{
              position: "absolute",
              width: 180 + i * 56, height: 180 + i * 56,
              borderRadius: "50%",
              border: `1px solid rgba(184,149,106,${lerp(0, 0.18, scale) - i * 0.02})`,
              left: "50%", top: "50%",
              transform: `translate(-50%, -50%) scale(${scale * idlePulse})`,
              transition: "none",
            }} />
          );
        })}
      </div>
      <div style={{ textAlign: "center", position: "relative", zIndex: 1, padding: "0 24px" }}>
        <div style={{
          fontSize: 12, letterSpacing: 4, textTransform: "uppercase",
          color: "rgba(184,149,106,0.85)", marginBottom: 18, fontWeight: 600,
          opacity: easeRev(Math.max(0, (revealed - 0.04) * 5)),
          transform: `translateY(${lerp(14, 0, easeRev(Math.max(0, (revealed - 0.04) * 5)))}px)`
        }}>{cs.tr('animBrand')}</div>
        <div style={{ display: "flex", gap: 20, justifyContent: "center", flexWrap: "wrap" }}>
          {words.map((w, i) => {
            const delay = 0.12 + i * 0.1;
            const wt = easeRev(Math.max(0, (revealed - delay) * 3.5));
            const float = t > 0.6 ? breathe(t - 0.6 + i * 0.25, 0.2, 3) : 0;
            return (
              <span key={i} style={{
                fontSize: "clamp(20px, 3.5vw, 30px)", color: colors[i],
                opacity: lerp(0, 1, wt),
                transform: `translateY(${lerp(22, float, wt)}px) scale(${lerp(0.88, 1, wt)})`,
                display: "inline-block",
              }}>{w}</span>
            );
          })}
        </div>
        {/* Divider line */}
        <div style={{
          height: 1.5,
          width: `${lerp(0, 260, easeRev(Math.max(0, (revealed - 0.52) * 3)))}px`,
          background: "linear-gradient(90deg, transparent, #B8956A, transparent)",
          margin: "22px auto 18px",
        }} />
        <div style={{
          fontSize: "clamp(13px, 2vw, 17px)", color: "rgba(253,252,250,0.85)",
          opacity: easeRev(Math.max(0, (revealed - 0.68) * 4)),
          transform: `translateY(${lerp(10, 0, easeRev(Math.max(0, (revealed - 0.68) * 4)))}px)`,
          fontStyle: "italic",
        }}>{cs.tr('animOnePage')}</div>
      </div>
    </div>
  );
};

/* Animation 2: Stuck — problems orbit then gently pulse */
const StuckAnim = () => {
  const ref = React.useRef(null);
  const inView = useInView(ref, 0.2);
  const t = useAnimTimer(inView, 9000);
  const cs = window.__CS;

  const problems = [
    { icon: "◎", labelKey: "animUnclearNiche", x: 18, y: 22 },
    { icon: "◇", labelKey: "animWeakMsg",      x: 67, y: 18 },
    { icon: "□", labelKey: "animNoPresence",   x: 28, y: 68 },
    { icon: "△", labelKey: "animNoBooking",    x: 74, y: 68 },
  ];
  const revealed = Math.min(t, 1);

  return (
    <div ref={ref} style={{
      width: "100%", aspectRatio: "16/9", borderRadius: 16, overflow: "hidden",
      background: "linear-gradient(150deg, #1E1C19, #2A2622, #332F2A)", position: "relative"
    }}>
      {/* Central coach node */}
      <div style={{
        position: "absolute", left: "50%", top: "50%",
        transform: `translate(-50%, -50%) scale(${easeRev(revealed * 5)})`,
        width: 58, height: 58, borderRadius: "50%",
        background: "rgba(184,149,106,0.12)", border: "2px solid rgba(184,149,106,0.28)",
        display: "flex", alignItems: "center", justifyContent: "center",
        fontSize: 22, color: "rgba(184,149,106,0.55)",
        boxShadow: `0 0 ${lerp(0, 24, easeRev(revealed * 4))}px rgba(184,149,106,0.08)`,
        opacity: easeRev(revealed * 5),
      }}>●</div>
      {/* Problem nodes */}
      {problems.map((p, i) => {
        const delay = 0.18 + i * 0.11;
        const pt = easeRev(Math.max(0, (revealed - delay) * 2.8));
        const idleFloat = t > 0.7 ? breathe(t - 0.7 + i * 0.3, 0.16, 4) : 0;
        return (
          <div key={i} style={{
            position: "absolute", left: `${p.x}%`, top: `${p.y}%`,

          }}>

              width: 44, height: 44, borderRadius: 12,
              background: "rgba(184,149,106,0.10)", border: "1px solid rgba(184,149,106,0.22)",
              display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 18, color: "#B8956A", margin: "0 auto 5px",
            }}>{p.icon}</div>
            <div style={{ fontSize: 12, color: "rgba(253,252,250,0.85)", whiteSpace: "nowrap", fontWeight: 500 }}>{cs.tr(p.labelKey)}</div>
          </div>
        );
      })}
      {/* Dashed disconnection lines */}
      <svg style={{ position: "absolute", inset: 0, width: "100%", height: "100%" }}>
        {problems.map((p, i) => {
          const lt = easeRev(Math.max(0, (revealed - 0.3 - i * 0.09) * 2.2));
          return (
            <line key={i} x1="50%" y1="50%" x2={`${p.x}%`} y2={`${p.y}%`}
              stroke="rgba(184,149,106,0.12)" strokeWidth="1"
              strokeDasharray="4 4" opacity={lt}
            />

        })}

};

/* Animation 3: Method — steps build sequentially then pulse */
const MethodAnim = () => {
  const ref = React.useRef(null);
  const inView = useInView(ref, 0.2);
  const t = useAnimTimer(inView, 9000);
  const cs = window.__CS;

  const steps = [
    { num: "01", labelKey: "identity",    color: "#B8956A" },
    { num: "02", labelKey: "message",     color: "#D4B896" },
    { num: "03", labelKey: "animPresence",color: "#9A7B55" },
    { num: "04", labelKey: "animFlow",    color: "#C4A07A" },
  ];
  const revealed = Math.min(t, 1);

  return (
    <div ref={ref} style={{

            }}>
              <div style={{
                width: 52, height: 52, borderRadius: 14,
                background: `rgba(${s.color === "#B8956A" ? "184,149,106" : s.color === "#D4B896" ? "212,184,150" : s.color === "#9A7B55" ? "154,123,85" : "196,160,122"}, ${lerp(0.06, 0.18, idleGlow)})`,
                border: `1.5px solid rgba(${s.color === "#B8956A" ? "184,149,106" : s.color === "#D4B896" ? "212,184,150" : s.color === "#9A7B55" ? "154,123,85" : "196,160,122"}, ${lerp(0.15, 0.5, idleGlow)})`,
                display: "flex", alignItems: "center", justifyContent: "center",
                fontFamily: "var(--font-display)", fontSize: 18, color: s.color,
                boxShadow: `0 0 ${lerp(0, 16, idleGlow)}px ${s.color}22`,

            </div>
            {i < 3 && (

                background: `linear-gradient(90deg, ${s.color}60, ${steps[i+1].color}60)`,

};

/* Animation 4: Tools converge then glow */
const ToolsMergeAnim = () => {
  const ref = React.useRef(null);
  const inView = useInView(ref, 0.2);
  const t = useAnimTimer(inView, 9000);
  const cs = window.__CS;

  const toolKeys = ['animBrand', 'message', 'animContent', 'animStory', 'animJourney'];
  const angles = [0, 72, 144, 216, 288];
  const revealed = Math.min(t, 1);
  const mergeT = easeRev(Math.max(0, (revealed - 0.38) * 2.2));
  const radius = lerp(95, 0, mergeT);
  const idleGlow = t > 0.9 ? 0.5 + breathe(t - 0.9, 0.25, 0.4) : 0;

  return (
    <div ref={ref} style={{
      width: "100%", aspectRatio: "16/9", borderRadius: 16, overflow: "hidden",

    }}>
      {toolKeys.map((key, i) => {
        const angle = (angles[i] * Math.PI) / 180;
        const x = Math.cos(angle) * radius;
        const y = Math.sin(angle) * radius;
        const appear = easeRev(Math.max(0, (revealed - i * 0.055) * 3.5));
        return (
          <div key={i} style={{
            position: "absolute",
            transform: `translate(${x}px, ${y}px) scale(${lerp(0.75, mergeT > 0.92 ? 0 : 1, appear)})`,
            opacity: mergeT > 0.94 ? 0 : appear,
            display: "flex", flexDirection: "column", alignItems: "center", gap: 5,
          }}>
            <div style={{
              width: 38, height: 38, borderRadius: 10,
              background: "rgba(184,149,106,0.10)", border: "1px solid rgba(184,149,106,0.28)",
              display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 15, color: "#B8956A",
            }}>◆</div>
            <span style={{ fontSize: 11, color: "rgba(253,252,250,0.85)", fontWeight: 500 }}>{cs.tr(key)}</span>
          </div>
        );
      })}
      {/* Merged result */}
      <div style={{
        opacity: easeRev(Math.max(0, (revealed - 0.68) * 3.5)),
        transform: `scale(${easeRev(Math.max(0, (revealed - 0.68) * 3.5))})`,
        textAlign: "center",
      }}>
        <div style={{
          width: 68, height: 68, borderRadius: 18,
          background: "linear-gradient(135deg, #B8956A, #D4B896)",
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: 26, color: "#1E1C19", margin: "0 auto 10px",
          boxShadow: `0 8px ${lerp(24, 48, idleGlow)}px rgba(184,149,106,${lerp(0.3, 0.6, idleGlow)})`,
        }}>★</div>
        <span style={{ fontSize: 12, color: "rgba(253,252,250,0.85)", letterSpacing: 1 }}>{cs.tr('animYourPage')}</span>
      </div>
    </div>
  );
};

/* Animation 5: Before/After — reveal then shimmer on "after" */
const TransformAnim = () => {
  const ref = React.useRef(null);
  const inView = useInView(ref, 0.2);
  const t = useAnimTimer(inView, 9000);
  const cs = window.__CS;

  const revealed = Math.min(t, 1);
  const splitT = easeRev(Math.max(0, (revealed - 0.08) * 2.2));
  const afterT = easeRev(Math.max(0, (revealed - 0.48) * 2.2));
  const beforeLabels = [cs.tr('animUnclear'), cs.tr('animInvisible'), cs.tr('animNoClients')];
  const afterLabels  = [cs.tr('animClear'),   cs.tr('animRecognizable'), cs.tr('animBooked')];

  return (
    <div ref={ref} style={{
      width: "100%", aspectRatio: "16/9", borderRadius: 16, overflow: "hidden",
      background: "#1E1C19", display: "flex", position: "relative"
    }}>
      {/* Before */}
      <div style={{
        flex: 1, display: "flex", flexDirection: "column", alignItems: "center",
        justifyContent: "center", gap: 10, opacity: splitT,
        borderRight: "1px solid rgba(184,149,106,0.12)",
      }}>
        <div style={{ fontSize: 9, letterSpacing: 3, color: "rgba(253,252,250,0.7)", textTransform: "uppercase", marginBottom: 2 }}>{cs.tr('before')}</div>
        {beforeLabels.map((item, i) => (
          <div key={i} style={{
            padding: "5px 14px", borderRadius: 8,
            background: "rgba(253,252,250,0.03)", border: "1px solid rgba(253,252,250,0.07)",
            fontSize: 12, color: "rgba(253,252,250,0.7)",
            opacity: easeRev(Math.max(0, (revealed - 0.14 - i * 0.07) * 3.5)),
          }}>{item}</div>
        ))}
      </div>
      {/* Arrow */}
      <div style={{
        position: "absolute", left: "50%", top: "50%", transform: "translate(-50%, -50%)",
        width: 34, height: 34, borderRadius: "50%",
        background: "rgba(184,149,106,0.14)", border: "1px solid rgba(184,149,106,0.3)",
        display: "flex", alignItems: "center", justifyContent: "center",
        fontSize: 15, color: "#B8956A", zIndex: 1,
        opacity: easeRev(Math.max(0, (revealed - 0.32) * 3.5)),
      }}>→</div>
      {/* After */}
      <div style={{
        flex: 1, display: "flex", flexDirection: "column", alignItems: "center",
        justifyContent: "center", gap: 10, opacity: afterT,
      }}>
        <div style={{ fontSize: 9, letterSpacing: 3, color: "#B8956A", textTransform: "uppercase", marginBottom: 2 }}>{cs.tr('after')}</div>
        {afterLabels.map((item, i) => {
          const shimmer = t > 0.85 ? 0.5 + breathe(t - 0.85 + i * 0.2, 0.22, 0.35) : 1;
          return (
            <div key={i} style={{
              padding: "5px 14px", borderRadius: 8,
              background: `rgba(184,149,106,${lerp(0.08, 0.16, shimmer)})`,
              border: `1px solid rgba(184,149,106,${lerp(0.2, 0.4, shimmer)})`,
              fontSize: 12, color: "#C4A07A", fontWeight: 500,
              opacity: easeRev(Math.max(0, (revealed - 0.54 - i * 0.07) * 3.5)),
            }}>{item}</div>
          );
        })}
      </div>
    </div>
  );
};

/* Animation 6: CTA — continuous looping ripples */
const CTAAnim = () => {
  const ref = React.useRef(null);
  const inView = useInView(ref, 0.3);
  const t = useAnimTimer(inView, 8000);

  const revealed = Math.min(t, 1);
  const activated = easeRev(Math.max(0, (revealed - 0.18) * 3.5));

  return (
    <div ref={ref} style={{
      width: "100%", aspectRatio: "16/9", borderRadius: 16, overflow: "hidden",
      background: "linear-gradient(150deg, #1E1C19, #2A2622, #332F2A)",
      display: "flex", alignItems: "center", justifyContent: "center", position: "relative"
    }}>
      {/* Continuous ripple rings — each offset in phase */}
      {[0, 1, 2, 3].map((i) => {
        const phase = ((t + i * 0.25) % 1);
        const size = lerp(48, 340, ease(phase));
        const op = lerp(0.35, 0, ease(phase)) * easeRev(revealed * 4);
        return (
          <div key={i} style={{
            position: "absolute", left: "50%", top: "50%",
            width: size, height: size,
            borderRadius: "50%",
            border: "1px solid rgba(184,149,106,0.22)",
            transform: "translate(-50%, -50%)",
            opacity: op,
          }} />
        );
      })}
      {/* CTA button mock */}
      <div style={{
        padding: "13px 34px", borderRadius: 50, position: "relative", zIndex: 1,
        background: activated > 0.55
          ? "linear-gradient(135deg, #B8956A, #D4B896)"
          : `rgba(184,149,106,${lerp(0.1, 0.2, activated)})`,
        color: activated > 0.55 ? "#1E1C19" : `rgba(184,149,106,${lerp(0.5, 1, activated)})`,
        fontSize: 15, fontWeight: 600, letterSpacing: 0.5,
        transform: `scale(${lerp(0.88, 1, easeRev(revealed * 4))})`,
        opacity: easeRev(revealed * 4),
        boxShadow: activated > 0.55
          ? `0 8px ${lerp(24, 40, 0.5 + breathe(t, 0.3, 0.4))}px rgba(184,149,106,${lerp(0.25, 0.45, 0.5 + breathe(t, 0.3, 0.4))})`
          : "none",
      }}>{window.__CS.tr('getStarted')} →</div>
    </div>
  );
};

Object.assign(window, { HeroBrandAnim, StuckAnim, MethodAnim, ToolsMergeAnim, TransformAnim, CTAAnim });

  const ref = React.useRef(null);
  const [vis, setVis] = React.useState(false);
  React.useEffect(() => {
    if (!ref.current) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setVis(true); }, { threshold: 0.15 });
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return (
    <div ref={ref} className={className} style={{
      opacity: vis ? 1 : 0,
      transform: vis ? "translateY(0)" : "translateY(28px)",
      transition: `opacity 0.7s ${delay}s var(--ease-out), transform 0.7s ${delay}s var(--ease-out)`,

  const cs = window.__CS;

      example: "James added a single 'Book a free 15-min call' button and saw inquiries jump 4x in the first month."
    }
  };
  const guide = guides[step.num] || { exercises: [], example: "" };

  return (
    <Modal open={open} onClose={onClose} wide>
      <div style={{ display: "flex", gap: 12, alignItems: "center", marginBottom: 24 }}>
        <div style={{
          fontFamily: "var(--font-display)", fontSize: 32, color: "var(--gold)"
        }}>{step.num}</div>
        <div>
          <h3 style={{ fontFamily: "var(--font-display)", fontSize: 24, color: "var(--charcoal)" }}>{step.title}</h3>
          <p style={{ fontSize: 14, color: "var(--text-muted)" }}>{step.desc}</p>
        </div>
      </div>
      <div style={{
        padding: 20, borderRadius: 14, background: "var(--cream)", border: "1px solid var(--sand)",
        marginBottom: 24
      }}>
        <div style={{ fontSize: 12, letterSpacing: 2, textTransform: "uppercase", color: "var(--gold)", marginBottom: 12 }}>
          {cs.tr('outputLabel')}
        </div>
        <div style={{ fontSize: 15, color: "var(--charcoal)", fontWeight: 500 }}>{step.output}</div>
      </div>
      <div style={{ fontSize: 12, letterSpacing: 2, textTransform: "uppercase", color: "var(--gold)", marginBottom: 16 }}>
        {cs.tr('guidedExercises')}
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 28 }}>
        {guide.exercises.map((ex, i) => (
          <div key={i} style={{
            padding: 16, borderRadius: 12, background: "var(--cream)", border: "1px solid var(--sand)",
            fontSize: 14, color: "var(--text)", lineHeight: 1.6,
            display: "flex", gap: 12, alignItems: "flex-start"
          }}>
            <div style={{
              width: 22, height: 22, borderRadius: 6, flexShrink: 0,
              background: "rgba(184,149,106,0.1)", display: "flex",
              alignItems: "center", justifyContent: "center",
              fontSize: 11, color: "var(--gold)", fontWeight: 600
            }}>{i + 1}</div>
            {ex}
          </div>
        ))}
      </div>
      <div style={{
        padding: 20, borderRadius: 14, background: "rgba(184,149,106,0.06)",
        border: "1px solid rgba(184,149,106,0.15)"
      }}>
        <div style={{ fontSize: 12, letterSpacing: 2, textTransform: "uppercase", color: "var(--gold)", marginBottom: 8 }}>
          {cs.tr('realExample')}
        </div>
        <p style={{ fontSize: 14, color: "var(--text)", lineHeight: 1.7, fontStyle: "italic" }}>{guide.example}</p>
      </div>
    </Modal>
  );
};

/* ==================== TOOL DEMO ==================== */
const ToolDemo = ({ open, onClose, tool }) => {
  if (!tool) return null;
  const [input, setInput] = React.useState("");
  const [output, setOutput] = React.useState("");
  const [loading, setLoading] = React.useState(false);

  React.useEffect(() => { if (open) { setInput(""); setOutput(""); setLoading(false); } }, [open, tool]);

  const demos = {
    brand: { prompt: "Describe your coaching style in 3 words:", outputGen: (v) => `Brand keywords: ${v}\n\nSuggested palette: Warm golds, soft creams, charcoal anchors\nVoice: Confident yet warm, direct but empathetic\nFont style: Modern serif headlines, clean sans body` },
    messaging: { prompt: "What's the #1 problem your clients face?", outputGen: (v) => `Headline options:\n1. "Stop ${v.toLowerCase()} — start leading with clarity"\n2. "The ${v.toLowerCase()} ends here"\n3. "From ${v.toLowerCase()} to confident action"\n\nValue prop: You help people move past ${v.toLowerCase()} into a place of clarity and purpose.` },
    content: { prompt: "What topics do you teach most often?", outputGen: (v) => `Content pillars based on "${v}":\n\n1. Educational — Break down your methodology\n2. Story — Share client transformations\n3. Insight — Your unique perspective on the field\n\n30-day starter: 3 posts/week, rotating pillars` },
    story: { prompt: "What moment made you decide to become a coach?", outputGen: (v) => `Your origin story framework:\n\nThe Turning Point: "${v}"\nThe Journey: What you learned and how it shaped your approach\nThe Mission: Why you now help others with this\n\nThis becomes the "About" section of your page.` },
    journey: { prompt: "Where do most of your clients find you?", outputGen: (v) => `Client journey from "${v}":\n\n${v} → Your page → Read your story → See the transformation → Book free call → Discovery session → Paid program\n\nKey insight: Add a lead magnet between discovery and booking to build trust.` },
  };

  const demo = demos[tool.id] || demos.brand;

  const handleGenerate = () => {
    if (!input.trim()) return;
    setLoading(true);
    setTimeout(() => { setOutput(demo.outputGen(input)); setLoading(false); }, 1500);
  };

  return (
    <Modal open={open} onClose={onClose} wide>
      <div style={{ display: "flex", gap: 12, alignItems: "center", marginBottom: 24 }}>
        <div style={{
          width: 44, height: 44, borderRadius: 11, flexShrink: 0,
          background: "rgba(184,149,106,0.1)", border: "1px solid rgba(184,149,106,0.2)",
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: 18, color: "var(--gold)"
        }}>{tool.icon}</div>
        <div>
          <h3 style={{ fontFamily: "var(--font-display)", fontSize: 24, color: "var(--charcoal)" }}>{tool.title}</h3>
          <p style={{ fontSize: 14, color: "var(--text-muted)" }}>{tool.desc}</p>
        </div>
      </div>

      <div style={{ marginBottom: 20 }}>
        <label style={{ fontSize: 14, fontWeight: 500, color: "var(--charcoal)", display: "block", marginBottom: 8 }}>
          {demo.prompt}
        </label>
        <div style={{ display: "flex", gap: 10 }}>
          <input value={input} onChange={e => setInput(e.target.value)}
            onKeyDown={e => e.key === "Enter" && handleGenerate()}
            placeholder="Type your answer..."
            style={{
              flex: 1, padding: "12px 16px", borderRadius: 12,
              border: "1.5px solid var(--sand)", background: "var(--cream)",
              fontSize: 15, fontFamily: "var(--font-body)", color: "var(--text)", outline: "none",
            }}
          />
          <button onClick={handleGenerate} style={{
            padding: "12px 20px", borderRadius: 12, background: "var(--charcoal)",
            color: "var(--cream)", border: "none", fontSize: 14, cursor: "pointer",
            fontFamily: "var(--font-body)", fontWeight: 500, whiteSpace: "nowrap",
          }}>{window.__CS.tr('generate')}</button>
        </div>
      </div>

      {loading && (
        <div style={{ textAlign: "center", padding: "32px 0" }}>
          <div style={{
            width: 36, height: 36, border: "2px solid var(--sand)", borderTopColor: "var(--gold)",
            borderRadius: "50%", animation: "spin 0.8s linear infinite", display: "inline-block"
          }}></div>
          <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
        </div>
      )}

      {output && !loading && (
        <div style={{
          padding: 24, borderRadius: 14, background: "var(--cream)", border: "1px solid var(--sand)",
          whiteSpace: "pre-wrap", fontSize: 14, color: "var(--text)", lineHeight: 1.7,
          fontFamily: "var(--font-body)"
        }}>{output}</div>
      )}
    </Modal>
  );
};

/* ==================== BOOKING FLOW ==================== */
const BookingFlow = ({ open, onClose }) => {
  const cs = window.__CS;
  const [form, setForm] = React.useState({ name: "", email: "", time: "" });
  const [submitted, setSubmitted] = React.useState(false);
  React.useEffect(() => { if (open) { setForm({ name: "", email: "", time: "" }); setSubmitted(false); } }, [open]);

  const times = ["Mon 10:00 AM", "Tue 2:00 PM", "Wed 11:00 AM", "Thu 3:00 PM", "Fri 10:00 AM"];

  const handleSubmit = (e) => {
    e.preventDefault();
    if (form.name && form.email && form.time) setSubmitted(true);
  };

  return (
    <Modal open={open} onClose={onClose}>
      {!submitted ? (
        <form onSubmit={handleSubmit}>
          <div style={{
            fontSize: 12, letterSpacing: 3, textTransform: "uppercase",
            color: "var(--gold)", marginBottom: 12
          }}>{cs.tr('bookCall')}</div>
          <h3 style={{
            fontFamily: "var(--font-display)", fontSize: 26, color: "var(--charcoal)", marginBottom: 8
          }}>{cs.tr('talkTitle')}</h3>
          <p style={{ fontSize: 14, color: "var(--text-muted)", marginBottom: 28, lineHeight: 1.6 }}>
            {cs.tr('talkBody')}
          </p>

          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            <div>
              <label style={{ fontSize: 13, fontWeight: 500, color: "var(--charcoal)", display: "block", marginBottom: 6 }}>{cs.tr('yourName')}</label>
              <input value={form.name} onChange={e => setForm({...form, name: e.target.value})}
                placeholder={cs.tr('yourName')} style={{
                  width: "100%", padding: "12px 16px", borderRadius: 12,
                  border: "1.5px solid var(--sand)", background: "var(--cream)",
                  fontSize: 15, fontFamily: "var(--font-body)", outline: "none",
                }} />
            </div>
            <div>
              <label style={{ fontSize: 13, fontWeight: 500, color: "var(--charcoal)", display: "block", marginBottom: 6 }}>Email</label>
              <input value={form.email} onChange={e => setForm({...form, email: e.target.value})}
                type="email" placeholder={cs.tr('yourEmail')} style={{
                  width: "100%", padding: "12px 16px", borderRadius: 12,
                  border: "1.5px solid var(--sand)", background: "var(--cream)",
                  fontSize: 15, fontFamily: "var(--font-body)", outline: "none",
                }} />
            </div>
            <div>
              <label style={{ fontSize: 13, fontWeight: 500, color: "var(--charcoal)", display: "block", marginBottom: 6 }}>{cs.tr('pickTime')}</label>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                {times.map(t => (
                  <button type="button" key={t} onClick={() => setForm({...form, time: t})} style={{
                    padding: "8px 16px", borderRadius: 20, fontSize: 13,
                    background: form.time === t ? "var(--charcoal)" : "var(--cream)",
                    color: form.time === t ? "var(--cream)" : "var(--text-muted)",
                    border: `1px solid ${form.time === t ? "var(--charcoal)" : "var(--sand)"}`,
                    cursor: "pointer", fontFamily: "var(--font-body)",
                    transition: "all 0.2s",
                  }}>{t}</button>
                ))}
              </div>
            </div>
          </div>
          <button type="submit" style={{
            width: "100%", marginTop: 24, padding: "14px", borderRadius: 50,
            background: (form.name && form.email && form.time) ? "var(--charcoal)" : "var(--sand)",
            color: (form.name && form.email && form.time) ? "var(--cream)" : "var(--text-muted)",
            border: "none", fontSize: 16, cursor: "pointer",
            fontFamily: "var(--font-body)", fontWeight: 500,
            transition: "all 0.3s var(--ease-out)",
          }}>{cs.tr('bookBtn')}</button>
        </form>
      ) : (
        <div style={{ textAlign: "center", padding: "20px 0" }}>
          <div style={{
            width: 56, height: 56, borderRadius: "50%", margin: "0 auto 20px",
            background: "rgba(184,149,106,0.12)", border: "1.5px solid rgba(184,149,106,0.25)",
            display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: 24, color: "var(--gold)"
          }}>✓</div>
          <h3 style={{ fontFamily: "var(--font-display)", fontSize: 24, color: "var(--charcoal)", marginBottom: 8 }}>
            {cs.tr('booked')(form.name)}
          </h3>
          <p style={{ fontSize: 15, color: "var(--text-muted)", lineHeight: 1.6, marginBottom: 8 }}>
            {cs.tr('bookedSub')(form.time, form.email)}
          </p>
          <p style={{ fontSize: 14, color: "var(--text-light)" }}>
            {cs.tr('bookedNote')}
          </p>
          <button onClick={onClose} style={{
            marginTop: 24, padding: "12px 28px", borderRadius: 50,
            background: "var(--gold)", color: "var(--white)", border: "none",
            fontSize: 15, cursor: "pointer", fontFamily: "var(--font-body)", fontWeight: 500,
          }}>{cs.tr('done')}</button>
        </div>
      )}
    </Modal>
  );
};

Object.assign(window, {
  Modal, OnboardingFlow, WalkthroughFlow, ProblemDetail,
  MethodStepDetail, ToolDemo, BookingFlow
});
</script>
<!-- app.jsx -->
<script type="text/babel">
/* Main App — wires sections + flows together */
/* Capture real TweaksPanel from tweaks-panel.jsx before local const overwrites window.TweaksPanel */
const _RealTweaksPanel = window.TweaksPanel;
const _RealTweakSection = window.TweakSection;
const _RealTweakColor = window.TweakColor;
const _RealTweakToggle = window.TweakToggle;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#B8956A",
  "darkSections": true,
  "animationsEnabled": true
}/*EDITMODE-END*/;

const App = () => {
  const [tweaks, setTweakState] = React.useState(TWEAK_DEFAULTS);
  const setTweak = (keyOrObj, val) => {
    const updates = typeof keyOrObj === "string" ? { [keyOrObj]: val } : keyOrObj;
    setTweakState(prev => {
      const next = { ...prev, ...updates };
      window.parent.postMessage({ type: "__edit_mode_set_keys", edits: updates }, "*");
      return next;
    });
  };

  // Theme & language
  const [theme, setTheme] = React.useState('light');
  const [lang, setLang] = React.useState('en');

  const toggleTheme = () => setTheme(t => t === 'light' ? 'dark' : 'light');
  const changeLang = (code) => {
    setLang(code);
    window.__CS.lang = code;
    // RTL for Hebrew
    document.documentElement.dir = code === 'he' ? 'rtl' : 'ltr';
    document.documentElement.lang = code;
  };

  // Apply theme attribute on root
  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    window.__CS.theme = theme;
  }, [theme]);

  // Modal states
  const [showOnboarding, setShowOnboarding] = React.useState(false);
  const [showWalkthrough, setShowWalkthrough] = React.useState(false);
  const [showBooking, setShowBooking] = React.useState(false);
  const [activeProblem, setActiveProblem] = React.useState(null);
  const [activeStep, setActiveStep] = React.useState(null);
  const [activeTool, setActiveTool] = React.useState(null);

  return (
    <div style={{
      "--gold": tweaks.accentColor,
      "--gold-light": tweaks.accentColor + "cc",
      "--gold-dark": tweaks.accentColor,
    }}>
      <Nav
        onBuild={() => setShowOnboarding(true)}
        theme={theme} onThemeToggle={toggleTheme}
        lang={lang} onLangChange={changeLang}
      />

      <HeroSection
        onBuild={() => setShowOnboarding(true)}
        onDemo={() => setShowWalkthrough(true)}
      />
      <StuckSection onExpandProblem={(p) => setActiveProblem(p)} />
      <MethodSection onOpenStep={(s) => setActiveStep(s)} />
      {tweaks.darkSections && (
        <ToolsSection onOpenTool={(t) => setActiveTool(t)} />
      )}
      {!tweaks.darkSections && (
        <ToolsSectionLight onOpenTool={(t) => setActiveTool(t)} />
      )}
      <TransformSection />
      <TimelineSection />
      <CTASection
        onBuild={() => setShowOnboarding(true)}
        onTalk={() => setShowBooking(true)}
      />
      <Footer />

      {/* Modals */}
      <OnboardingFlow open={showOnboarding} onClose={() => setShowOnboarding(false)} />
      <WalkthroughFlow open={showWalkthrough} onClose={() => setShowWalkthrough(false)} />
      <ProblemDetail open={!!activeProblem} onClose={() => setActiveProblem(null)} problem={activeProblem} />
      <MethodStepDetail open={!!activeStep} onClose={() => setActiveStep(null)} step={activeStep} />
      <ToolDemo open={!!activeTool} onClose={() => setActiveTool(null)} tool={activeTool} />
      <BookingFlow open={showBooking} onClose={() => setShowBooking(false)} />

      {/* Tweaks Panel */}
      <TweaksPanel tweaks={tweaks} setTweak={setTweak} />
    </div>
  );
};

/* Light variant of tools section */
const ToolsSectionLight = ({ onOpenTool }) => {
  const cs = window.__CS;
  const tools = [
    { id: "brand", title: cs.tr('tool1Title'), desc: cs.tr('tool1Desc'), icon: "◆" },
    { id: "messaging", title: cs.tr('tool2Title'), desc: cs.tr('tool2Desc'), icon: "◈" },
    { id: "content", title: cs.tr('tool3Title'), desc: cs.tr('tool3Desc'), icon: "▣" },
    { id: "story", title: cs.tr('tool4Title'), desc: cs.tr('tool4Desc'), icon: "◉" },
    { id: "journey", title: cs.tr('tool5Title'), desc: cs.tr('tool5Desc'), icon: "⬡" },
  ];
  return (
    <section style={{ background: "var(--cream)" }}>
      <div style={{ padding: "120px 0", maxWidth: 1200, margin: "0 auto", paddingLeft: 32, paddingRight: 32 }}>
        <Reveal><div style={{ fontSize: 12, letterSpacing: 3, textTransform: "uppercase", color: "var(--gold)", fontWeight: 500, marginBottom: 16 }}>{cs.tr('toolsTag')}</div></Reveal>
        <Reveal delay={0.05}><h2 style={{ fontFamily: "var(--font-display)", fontSize: "clamp(32px, 5vw, 52px)", lineHeight: 1.15, color: "var(--charcoal)", marginBottom: 20 }}>{cs.tr('toolsH2')}</h2></Reveal>
        <Reveal delay={0.1}><p style={{ fontSize: 18, lineHeight: 1.7, color: "var(--text-muted)", maxWidth: 560, marginBottom: 48 }}>{cs.tr('toolsBody')}</p></Reveal>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16 }}>
          {tools.map((tool, i) => (
            <Reveal key={tool.id} delay={0.15 + i * 0.06}>
              <button onClick={() => onOpenTool(tool)} style={{
                padding: 24, borderRadius: 14, textAlign: "left", width: "100%",
                background: "var(--white)", border: "1px solid var(--sand)",
                cursor: "pointer", fontFamily: "var(--font-body)",
                transition: "all 0.3s var(--ease-out)",
                gridColumn: i === 4 ? "2 / 3" : "auto",
              }}
                onMouseEnter={e => { e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = "0 8px 24px rgba(0,0,0,0.06)"; }}
                onMouseLeave={e => { e.currentTarget.style.transform = "none"; e.currentTarget.style.boxShadow = "none"; }}
              >
                <div style={{ fontSize: 20, color: "var(--gold)", marginBottom: 10 }}>{tool.icon}</div>
                <div style={{ fontWeight: 600, fontSize: 18, color: "var(--charcoal)", marginBottom: 8 }}>{tool.title}</div>
                <div style={{ fontSize: 14, color: "var(--text-muted)", lineHeight: 1.55 }}>{tool.desc}</div>
              </button>
            </Reveal>
          ))}
        </div>
      </div>
    </section>
  );
};

/* Tweaks Panel */
const TweaksPanel = ({ tweaks, setTweak }) => {
  return (
    <_RealTweaksPanel>
      <_RealTweakSection label="Brand">
        <_RealTweakColor label="Accent color" value={tweaks.accentColor}
          options={["#B8956A", "#7B8F6A", "#6A8FB8", "#B86A8F", "#8F6AB8"]}
          onChange={v => setTweak("accentColor", v)} />
      </_RealTweakSection>
      <_RealTweakSection label="Layout">
        <_RealTweakToggle label="Dark tools section" value={tweaks.darkSections}
          onChange={v => setTweak("darkSections", v)} />
        <_RealTweakToggle label="Animations" value={tweaks.animationsEnabled}
          onChange={v => setTweak("animationsEnabled", v)} />
      </_RealTweakSection>
    </_RealTweaksPanel>
  );
};

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
